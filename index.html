<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>
<link rel="stylesheet" href="style.css">
<script>
  (function () {
    var saved = localStorage.getItem("theme");
    var theme = saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark and light mode" title="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
      <h1>Todo</h1>
      <p class="subtitle" id="task-summary">No tasks yet</p>
    </header>

    <form id="todo-form" class="todo-form">
      <input
        type="text"
        id="todo-input"
        placeholder="What needs to be done?"
        autocomplete="off"
        maxlength="200"
      >
      <div class="form-row">
        <input
          type="datetime-local"
          id="todo-datetime"
          aria-label="Due date and time"
        >
        <button type="submit">Add task</button>
      </div>
    </form>

    <div class="filters" role="tablist">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <div class="list-footer">
      <button id="clear-completed" class="text-btn">Clear completed</button>
    </div>
  </div>

  <template id="todo-item-template">
    <li class="todo-item">
      <label class="todo-check">
        <input type="checkbox" class="todo-checkbox">
        <span class="checkmark"></span>
      </label>
      <div class="todo-main">
        <span class="todo-text"></span>
        <input type="text" class="todo-edit-input" maxlength="200">
        <span class="todo-due"></span>
      </div>
      <button class="delete-btn" title="Delete task" aria-label="Delete task">&times;</button>
    </li>
  </template>

  <script src="script.js"></script>
</body>
</html>
